<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Login</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .login-box{
            width:350px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-bottom:15px;
        }
    </style>

</head>

<body>

<div class="login-box">

<h2>Recruiter Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

</div>

</body>
</html>
